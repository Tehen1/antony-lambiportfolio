# Dependency Review Configuration
# Fails PR if new vulnerabilities are introduced or licenses are non-compliant

fail-on-severity: high

# Allow specific licenses (MIT, Apache-2.0, BSD, ISC are generally safe)
allow-licenses:
  - MIT
  - Apache-2.0
  - BSD-2-Clause
  - BSD-3-Clause
  - ISC
  - CC0-1.0
  - Unlicense
  - WTFPL

# Deny problematic licenses
deny-licenses:
  - GPL-2.0
  - GPL-3.0
  - AGPL-3.0
  - LGPL-2.1
  - LGPL-3.0
  - SSPL-1.0
  - Elastic-2.0
  - BSL-1.0
  - Commons-Clause-1.0

# Allow specific vulnerable packages if they have no fix yet (temporary)
# Format: "package-name@version": "reason"
allow-vulnerabilities: {}

# Scope: only check production dependencies for license compliance
scope: production
