name: Security audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read
  security-events: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high
